<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Baba</title><style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;

    /* BLUE + SILVER AESTHETIC BACKGROUND */
    background: linear-gradient(135deg, #0a1f44, #1e3a8a, #60a5fa);
}

/* floating glowing particles */
.circle {
    position: absolute;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    filter: blur(25px);
    animation: float 10s infinite ease-in-out;
}

.circle:nth-child(1){top:10%;left:15%;}
.circle:nth-child(2){top:60%;left:70%;animation-duration:12s;}
.circle:nth-child(3){top:80%;left:25%;animation-duration:14s;}
.circle:nth-child(4){top:30%;left:80%;animation-duration:11s;}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-50px);}
    100% {transform: translateY(0);}
}

.container {
    text-align: center;
    z-index: 10;
}

h1 {
    font-size: 3.5rem;
    color: #e2e8f0; /* silver tone */
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: glow 2s infinite alternate;
}

p {
    color: #dbeafe;
    font-size: 1.3rem;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

@keyframes glow {
    from {opacity: 0.8; transform: scale(1);}
    to {opacity: 1; transform: scale(1.05);}
}
</style></head><body><div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div><div class="container">
    <h1>🎂 Happy Birthday BABA 🎂</h1>
    <p>May your life always shine with peace, health & happiness</p>
    <p>Love from Samiya ❤️</p>
</div><!-- soft birthday music --><audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio></body>
                            </html>
